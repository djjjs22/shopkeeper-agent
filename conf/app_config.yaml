logging:
  file:
    enable: true
    level: INFO
    path: logs
    rotation: "10 MB"
    retention: "7 days"
  console:
    enable: true
    level: INFO

db_meta:
  host: localhost
  port: 3306
  user: didilili
  password: dili123
  database: meta

db_dw:
  host: localhost
  port: 3306
  user: didilili
  password: dili123
  database: dw

qdrant:
  host: localhost
  port: 6333
  embedding_size: 1024

embedding:
  host: localhost
  port: 8081
  model: BAAI/bge-large-zh-v1.5

es:
  host: localhost
  port: 9200
  index_name: data_agent

llm:
  model_name: deepseek-v4-pro
  api_key: ${oc.env:LLM_API_KEY}
  base_url: https://opencode.ai/zen/go/v1

redis_cfg:
  url: ${oc.env:REDIS_URL,redis://127.0.0.1:6379/0}
  max_connections: 20
  socket_timeout: 2.0
  default_ttl_seconds: 86400
  key_prefix: "session:"
  fail_threshold: 3
  # 内存 dict 降级层的最大 session 数（超过时 LRU 淘汰最旧 session）
  max_memory_sessions: 1000
  # 后台探活协程的间隔（秒）
  probe_interval_seconds: 30
