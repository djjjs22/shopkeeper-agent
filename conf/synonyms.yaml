# 业务同义词字典（2026-07-14 P1 新增）
#
# 为什么有这个文件
# ================
# LLM 不应该"猜"业务关系（"销售额"是不是"GMV"？"客单价"是不是"AOV"？）。
# 业务知识应该沉淀在配置里，LLM 只负责把用户的口语表述映射到主词 + 扩展别名。
#
# 用法
# ====
# app/services/synonyms_service.py 提供 expand_query() 函数：
#   输入："最近 7 天销售额"
#   输出："最近 7 天销售额 GMV 营业额 成交总额 order_amount"
#         ↑ 主词 + 别名都加进去，召回时一个词能命中多个向量
#
# 维护规则
# ========
# - 主词写在第一个位置，别名在列表里
# - 同义词要"等价"（业务含义一致），不是"相关"（不能"销售额"和"利润"放一起）
# - 加新词时同时加测试 case
# - 定期 review，过时的删掉

metrics:
  # 业务指标主词 + 同义词
  # 例：用户说"销售额"时，扩展出"GMV / 营业额 / 成交总额 / order_amount"
  销售额: [GMV, 营业额, 成交总额, order_amount]
  客单价: [AOV, 平均订单金额, average_order_value]
  复购率: [retention, repeat_purchase_rate, 二次购买率, 复购]
  转化率: [conversion_rate, cvr, 付费率, 转化]
  退货率: [refund_rate, return_rate, 退款率, 退货]
  订单数: [order_count, 订单量, 下单数]
  客户数: [customer_count, 用户数, 买家数]

dimensions:
  # 维度主词 + 同义词
  # 例：用户说"客户"时，扩展出"customer / 用户 / 买家 / customer_id"
  客户: [customer, 用户, 买家, 客户ID, customer_id]
  商品: [product, SKU, 商品ID, product_id, sku, 产品]
  门店: [store, 店铺, 门店ID, store_id, shop_id]
  地区: [region, 区域, 省份, 城市, area, 地理位置]
  品类: [category, 类别, 商品类别, product_category, cat]
  品牌: [brand, 牌子, 品牌名, brand_name]
  渠道: [channel, 来源, 推广渠道, traffic_source]

values:
  # 取值主词 + 同义词
  # 例：用户说"微信"时，扩展出"wechat / wx_pay / 微信支付"
  微信: [wechat, wx_pay, 微信支付, WeChat]
  支付宝: [alipay, ali_pay, 支付宝支付, Alipay]
  银行卡: [bank_card, 银联, unionpay, 银行卡支付]
  现金: [cash, 货到付款, COD]

  # 会员等级
  黄金会员: [黄金, gold, gold_member, VIP]
  钻石会员: [钻石, diamond, diamond_member, SVIP]
  普通会员: [普通, normal, normal_member]

  # 地区（中文俗称 → 内部 ID）
  华北: [北京, 天津, 河北, 山西, 内蒙古, HB]
  华东: [上海, 江苏, 浙江, 安徽, 福建, 江西, 山东, HD]
  华南: [广东, 广西, 海南, HN]
  华中: [河南, 湖北, 湖南, HZ]
  西南: [重庆, 四川, 贵州, 云南, 西藏, XN]
  西北: [陕西, 甘肃, 青海, 宁夏, 新疆, XB]
  东北: [辽宁, 吉林, 黑龙江, DB]
