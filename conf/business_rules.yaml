# 业务规则字典（2026-07-14 P2 新增）
#
# 为什么有这个文件
# ================
# 改前问题：复杂业务规则（"已付款订单"=什么状态、什么字段）全靠 LLM 在 prompt 里猜。
#         LLM 容易把"已付款"写成 status='completed'（实际应该是 'paid' AND paid_at IS NOT NULL），
#         或者把"华北"理解成某个具体省份而不是五省/市/区联合。
# 改后方案：业务规则沉淀在 YAML 配置里，LLM 只负责"识别用了哪些规则"，不再"解释规则"。
#
# 用法
# ====
# app/services/rule_service.py 提供 match_rules(query)：
#   输入："已付款的华北黄金会员销售额"
#   输出：[
#     "(fo.status = 'paid' AND fo.paid_at IS NOT NULL)",
#     "(dr.region_name IN ('北京', '天津', '河北', '山西', '内蒙古'))",
#     "(dc.member_level = '黄金')"
#   ]
#   generate_intent 节点把匹配出的规则作为 prompt 变量塞进去，LLM 直接拼 SQL。
#
# 字段名约定
# ==========
# - fo = fact_order（事实表订单）
# - dr = dim_region（维度表地区）
# - dc = dim_customer（维度表客户）
# - dp = dim_product（维度表商品）
# - ds = dim_store（维度表门店）
# - dd = dim_date（维度表日期）
# 改表别名时必须同步改规则配置

rules:
  # ── 订单状态 ──
  已付款订单:
    where: "(fo.status = 'paid' AND fo.paid_at IS NOT NULL)"
    description: "已支付且支付时间不为空"
    keywords: [已付款, 已支付, 付清, paid]

  未付款订单:
    where: "(fo.status = 'unpaid' OR fo.paid_at IS NULL)"
    description: "未支付或支付时间为空"
    keywords: [未付款, 未支付, 没付, unpaid]

  已发货订单:
    where: "(fo.status IN ('shipped', 'delivered'))"
    description: "已发货或已送达"
    keywords: [已发货, 已发货的, shipped]

  已完成订单:
    where: "(fo.status = 'completed' AND fo.completed_at IS NOT NULL)"
    description: "已完成且完成时间不为空"
    keywords: [已完成, 完成订单, completed]

  已退款订单:
    where: "(fo.refund_status = 'refunded')"
    description: "退款状态为已退款"
    keywords: [已退款, 退款, 退货, refund]

  # ── 时间范围 ──
  本月至今:
    where: "(fo.order_date >= DATE_FORMAT(CURRENT_DATE, '%Y-%m-01'))"
    description: "本月第一天到今天"
    keywords: [本月至今, 月初至今, MTD]

  本季度至今:
    where: "(fo.order_date >= DATE_FORMAT(CURRENT_DATE, '%Y-%m-01') - INTERVAL (MONTH(CURRENT_DATE)-1) MOD 3 MONTH)"
    description: "本季度第一天到今天"
    keywords: [本季度至今, 季度至今, QTD]

  本年至今:
    where: "(YEAR(fo.order_date) = YEAR(CURRENT_DATE))"
    description: "今年 1 月 1 日到今天"
    keywords: [本年至今, 年初至今, YTD]

  上月整月:
    where: "(fo.order_date >= DATE_FORMAT(DATE_SUB(CURRENT_DATE, INTERVAL 1 MONTH), '%Y-%m-01') AND fo.order_date < DATE_FORMAT(CURRENT_DATE, '%Y-%m-01'))"
    description: "上个月整月（不含今天）"
    keywords: [上月, 上个月的]

  # ── 地区 ──
  华北地区:
    where: "(dr.region_name IN ('北京', '天津', '河北', '山西', '内蒙古'))"
    description: "华北五省/市/区"
    keywords: [华北, 华北地区, 华北的]

  华东地区:
    where: "(dr.region_name IN ('上海', '江苏', '浙江', '安徽', '福建', '江西', '山东'))"
    description: "华东七省/市"
    keywords: [华东, 华东地区, 华东的]

  华南地区:
    where: "(dr.region_name IN ('广东', '广西', '海南'))"
    description: "华南三省/区"
    keywords: [华南, 华南地区, 华南的]

  华中地区:
    where: "(dr.region_name IN ('河南', '湖北', '湖南'))"
    description: "华中三省"
    keywords: [华中, 华中地区, 华中的]

  西南地区:
    where: "(dr.region_name IN ('重庆', '四川', '贵州', '云南', '西藏'))"
    description: "西南五省/市/区"
    keywords: [西南, 西南地区]

  西北地区:
    where: "(dr.region_name IN ('陕西', '甘肃', '青海', '宁夏', '新疆'))"
    description: "西北五省/区"
    keywords: [西北, 西北地区]

  东北地区:
    where: "(dr.region_name IN ('辽宁', '吉林', '黑龙江'))"
    description: "东北三省"
    keywords: [东北, 东北地区]

  # ── 会员等级 ──
  黄金会员:
    where: "(dc.member_level = '黄金')"
    description: "会员等级为黄金"
    keywords: [黄金会员, 黄金, gold, gold_member]

  钻石会员:
    where: "(dc.member_level = '钻石')"
    description: "会员等级为钻石"
    keywords: [钻石会员, 钻石, diamond]

  普通会员:
    where: "(dc.member_level = '普通')"
    description: "会员等级为普通"
    keywords: [普通会员, 普通, normal]

  VIP客户:
    where: "(dc.member_level IN ('黄金', '钻石'))"
    description: "VIP 客户 = 黄金 + 钻石"
    keywords: [VIP, vip, VVIP, 高价值客户]
