llm:
  # 2026-07-17 改造：保留原 llm 配置作为 strong profile 的默认值（兜底）
  # 新代码优先用 llm_profiles + node_profiles；老代码（直接读 app_config.llm）继续可用
  # 部署时**也**需要给 ${LLM_API_KEY} 注入值（兜底 profile 用的）
  model_name: MiniMax-M3
  api_key: ${oc.env:LLM_API_KEY}
  base_url: https://api.minimaxi.com/v1
  request_timeout: 30
  max_tokens: 2000

# ─────────────────────────────────────────────────────────────────────
# LLM Profile Registry（2026-07-17 改造）
# ─────────────────────────────────────────────────────────────────────
#
# **核心规则**：
# - `cheap`：弱模型 → 仅用于 respond_chitchat（闲聊节点）
# - `strong`：强模型 → 其余 7 个 LLM 节点全部用 strong
# - 想调整？直接改下面的 `node_profiles` 映射，**不要**改节点代码
#
# **占位符**：model_name / base_url / api_key 三个字段都走 ${ENV}
# 部署时必须从环境变量注入。示例（写入 .env 或 k8s secret）：
#
#   LLM_CHEAP_MODEL_NAME=MiniMax-M2.7
#   LLM_CHEAP_BASE_URL=https://你的cheap代理地址/v1
#   LLM_CHEAP_API_KEY=sk-cheap-xxxxx
#
#   LLM_STRONG_MODEL_NAME=MiniMax-M3
#   LLM_STRONG_BASE_URL=https://你的strong官方地址/v1
#   LLM_STRONG_API_KEY=sk-strong-xxxxx
#
#   ADMIN_TOKEN=自己设的admin鉴权token
#
# **fail-fast**：任何 ${ENV} 占位符缺失 → 启动时 RuntimeError（不会带病上线）
# **热切换**：POST /api/admin/llm-profile {node, profile} 改完映射立即生效，不用重启
#
llm_profiles:
  cheap:
    model_name: ${LLM_CHEAP_MODEL_NAME}
    base_url: ${LLM_CHEAP_BASE_URL}
    api_key: ${LLM_CHEAP_API_KEY}
    # 弱模型：超时短 + 输出短（闲聊响应简短，不浪费 token）
    request_timeout: 15
    max_tokens: 500
  strong:
    model_name: ${LLM_STRONG_MODEL_NAME}
    base_url: ${LLM_STRONG_BASE_URL}
    api_key: ${LLM_STRONG_API_KEY}
    # 强模型：超时长 + 输出长（SQL 生成可能需要复杂表达式）
    request_timeout: 30
    max_tokens: 2000

# 节点 → profile 映射
# **当前策略：只有 respond_chitchat 用 cheap（弱模型），其他 7 个节点全部 strong**
# - cheap（弱）→ 仅 respond_chitchat：闲聊响应简短，弱模型够用 + 省 token
# - strong（强）→ 其余 6 个：SQL 生成/纠错/改写/过滤/抽取都需要复杂推理
node_profiles:
  # 弱模型（cheap）：闲聊响应 + 意图分类（2026-07-17 优化）
  respond_chitchat: cheap
  classify_intent: cheap   # 5 选 1 分类任务，cheap 准确度足够，省 ~2.5s
  # 强模型（strong）：其余 6 个需要复杂推理的节点
  filter_table: strong
  filter_metric: strong
  extract_keywords: strong
  generate_intent: strong
  correct_sql: strong
  rewrite_query: strong
  # 2026-07-17 改造：Multi-Agent 三个新节点
  # - planner: 拆 sub_query（要复杂推理，必须 strong）
  # - aggregator: 多 sub 结果合并（要复杂推理，必须 strong）
  # - reviewer: 反思评分（要复杂推理，必须 strong）
  planner: strong
  aggregator: strong
  reviewer: strong

redis_cfg:
  url: ${oc.env:REDIS_URL,redis://127.0.0.1:6379/0}
  max_connections: 20
  socket_timeout: 2.0
  default_ttl_seconds: 86400
  key_prefix: "session:"
  fail_threshold: 3
  # 内存 dict 降级层的最大 session 数（超过时 LRU 淘汰最旧 session）
  max_memory_sessions: 1000
  # 后台探活协程的间隔（秒）
  probe_interval_seconds: 30
